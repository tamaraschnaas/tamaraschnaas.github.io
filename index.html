  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.

      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).

      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }

    // The bundled template still contains an archived VSP project card.
    // Remove it at runtime so the published page matches current i18n content.
    const archivedCard = Array.from(document.querySelectorAll('.card')).find((card) => {
      const txt = card.textContent || '';
      return /(?:Optimización Logística|Logistics Optimization|—\s*VSP|\bVSP\b)/i.test(txt);
    });
    if (archivedCard) archivedCard.remove();

    // Some bundled versions render About text as static HTML. Keep it synced
    // with i18n keys even when data-i18n attributes are missing there.
    function syncAboutTextFromI18n() {
      const dict = window.I18N;
      const lang = document.documentElement.lang === 'en' ? 'en' : 'es';
      if (!dict || !dict[lang]) return;
      const wantedP2Es = 'Acabo de regresar de un semestre de intercambio en WU Vienna, donde estudié business analytics y estrategia basada en datos. Hablo cuatro idiomas en distintos niveles de confianza. Me gustan los entornos internacionales y los retos que me desafían.';

      const aboutHeading = Array.from(document.querySelectorAll('h2')).find((h2) => {
        const t = (h2.textContent || '').trim().toLowerCase();
        return t === 'sobre' || t === 'about';
      });
      const section = aboutHeading ? aboutHeading.closest('section, .block, .container, .wrap') : null;
      if (!section) return;

      const paragraphs = Array.from(section.querySelectorAll('p')).filter((p) => {
        return (p.textContent || '').trim().length > 0;
      });
      if (paragraphs[0]) paragraphs[0].textContent = dict[lang]['about.p1'] || paragraphs[0].textContent;
      if (paragraphs[1]) {
        paragraphs[1].textContent =
          (lang === 'es' ? wantedP2Es : dict[lang]['about.p2']) ||
          paragraphs[1].textContent;
      }

      // Keep both "Sobre" paragraphs with identical typography.
      if (paragraphs.length >= 2) {
        const base = window.getComputedStyle(paragraphs[0]);
        paragraphs.slice(0, 2).forEach((p) => {
          p.style.fontFamily = base.fontFamily;
          p.style.fontSize = base.fontSize;
          p.style.fontWeight = base.fontWeight;
          p.style.lineHeight = base.lineHeight;
          p.style.letterSpacing = base.letterSpacing;
        });
      }

      // Fallback for fully static bundled markup where section lookup fails.
      const textP1Es = 'Soy estudiante de Ciencia de Datos en el ITAM';
      const textP2Es = 'Acabo de regresar de un semestre de intercambio';
      const textP1En = "I'm a Data Science undergraduate at ITAM";
      const textP2En = 'I just got back from an exchange semester';
      Array.from(document.querySelectorAll('p')).forEach((p) => {
        const txt = (p.textContent || '').trim();
        if (
          txt.includes(textP1Es) ||
          txt.includes(textP2Es) ||
          txt.includes(textP1En) ||
          txt.includes(textP2En)
        ) {
          if (txt.includes(textP1Es) || txt.includes(textP1En)) p.textContent = dict[lang]['about.p1'] || txt;
          if (txt.includes(textP2Es) || txt.includes(textP2En)) {
            p.textContent = (lang === 'es' ? wantedP2Es : dict[lang]['about.p2']) || txt;
          }
        }
      });

      // Hard fallback: replace known stale sentence variants anywhere in text nodes.
      const staleAboutP2Es = [
        'Acabo de regresar de un semestre de intercambio en WU Vienna, donde estudié business analytics y estrategia basada en datos. Hablo cuatro idiomas en distintos niveles de seguridad. Me gustan los entornos internacionales, las preguntas bien formuladas y los procesos que se pueden medir.',
        'Acabo de regresar de un semestre de intercambio en WU Vienna, donde estudié business analytics y estrategia basada en datos. Hablo cuatro idiomas en distintos niveles de seguridad. Me gustan los entornos internacionales y los retos que me desafían.'
      ];
      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
      let node = walker.nextNode();
      while (node) {
        const current = node.nodeValue || '';
        let replaced = current;
        staleAboutP2Es.forEach((s) => {
          replaced = replaced.replace(s, wantedP2Es);
        });
        if (replaced !== current) node.nodeValue = replaced;
        node = walker.nextNode();
      }
    }

    // Keep bundled "Intereses" list synced with i18n values.
    function syncInterestsFromI18n() {
      const dict = window.I18N;
      const lang = document.documentElement.lang === 'en' ? 'en' : 'es';
      if (!dict || !dict[lang]) return;

      const staleEs = 'Preguntas bien formuladas';
      const staleEsAlt = 'Aprendizaje continuo';
      const wantedEs = dict.es['int.7'] || 'Innovación con impacto';
      const staleEn = 'Well-posed questions';
      const staleEnAlt = 'Continuous learning';
      const wantedEn = dict.en['int.7'] || 'Impact-driven innovation';

      // Use whole body: bundled markup structure varies and section lookup can fail.
      const root = document.body || document.documentElement;
      if (!root) return;
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
      let node = walker.nextNode();
      while (node) {
        const current = node.nodeValue || '';
        let replaced = current
          .replaceAll(staleEs, wantedEs)
          .replaceAll(staleEsAlt, wantedEs)
          .replaceAll(staleEnAlt, wantedEn)
          .replaceAll(staleEn, wantedEn);
        // Keep visible language aligned even if both strings coexist in DOM.
        if (lang === 'es') replaced = replaced.replaceAll(wantedEn, staleEn).replaceAll(staleEn, wantedEn);
        if (lang === 'en') replaced = replaced.replaceAll(wantedEs, staleEs).replaceAll(staleEs, wantedEs);
        if (replaced !== current) node.nodeValue = replaced;
        node = walker.nextNode();
      }

      // Directly patch the 7th interest item in the Interests section.
      const interestHeading = Array.from(document.querySelectorAll('h2')).find((h2) => {
        const t = (h2.textContent || '').trim().toLowerCase();
        return t === 'intereses' || t === 'interests';
      });
      if (interestHeading) {
        const container = interestHeading.closest('section, .block, .container, .wrap') || document;
        const interestItems = Array.from(container.querySelectorAll('li'));
        const desired = lang === 'es' ? wantedEs : wantedEn;
        if (interestItems.length >= 7) {
          interestItems[6].textContent = desired;
        } else {
          // Fallback for non-list markup: patch element whose text is old/new int.7.
          const candidates = Array.from(container.querySelectorAll('*'));
          candidates.forEach((el) => {
            const txt = (el.textContent || '').trim();
            if (txt === staleEs || txt === staleEn || txt === wantedEs || txt === wantedEn) {
              el.textContent = desired;
            }
          });
        }
      }
    }

    syncAboutTextFromI18n();
    syncInterestsFromI18n();
    // Bundled render can overwrite text after this script runs; retry briefly.
    [50, 150, 300, 600, 1200, 2000].forEach((ms) => {
      setTimeout(syncAboutTextFromI18n, ms);
      setTimeout(syncInterestsFromI18n, ms);
    });
    const langToggle = document.getElementById('lang-toggle');
    if (langToggle) {
      langToggle.addEventListener('click', () => {
        setTimeout(syncAboutTextFromI18n, 0);
        setTimeout(syncInterestsFromI18n, 0);
      });
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"037b24af-4221-4045-8560-0cff24bb147a\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"39520f8b-e7bb-487e-a9ef-315a5d78d356\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"b397c2c6-08c3-4112-8207-ab3ffc8dd2ec\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"6823172a-6baa-438f-a2e1-4074765903aa\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"814c5f70-953a-47d3-a3dd-bf13b16e2b4f\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* =====================================================\n   TAMARA — PERSONAL SITE\n   Aesthetic: brutalist editorial · warm cream + terracotta\n   ===================================================== */\n\n:root {\n  --bg: #f4ede0;\n  --bg-2: #ece2cf;\n  --ink: #1f1d1a;\n  --ink-2: #6b5e4a;\n  --accent: #a8482e;\n  --accent-2: #c8623f;\n  --rule: #1f1d1a;\n  --rule-soft: rgba(31, 29, 26, 0.18);\n\n  --serif: \"Instrument Serif\", \"Times New Roman\", serif;\n  --sans:  \"Inter Tight\", system-ui, -apple-system, \"Helvetica Neue\", Arial, sans-serif;\n  --mono:  \"JetBrains Mono\", ui-monospace, \"SF Mono\", Menlo, Consolas, monospace;\n\n  --pad: clamp(20px, 4vw, 56px);\n  --pad-y: clamp(48px, 7vw, 96px);\n}\n\n* { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; }\nhtml { scroll-behavior: smooth; }\n\nbody {\n  background: var(--bg);\n  color: var(--ink);\n  font-family: var(--sans);\n  font-size: 17px;\n  line-height: 1.5;\n  letter-spacing: -0.005em;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n  overflow-x: hidden;\n\n  /* subtle paper grain */\n  background-image:\n    radial-gradient(circle at 20% 30%, rgba(31,29,26,0.025) 0, transparent 60%),\n    radial-gradient(circle at 80% 70%, rgba(168,72,46,0.03) 0, transparent 60%);\n}\n\n::selection { background: var(--accent); color: var(--bg); }\n\na { color: inherit; text-decoration: none; }\n\np { margin: 0 0 1em; text-wrap: pretty; }\nem, .italic { font-style: italic; }\n\n.serif { font-family: var(--serif); font-weight: 400; letter-spacing: -0.01em; line-height: 1.05; }\n.mono  { font-family: var(--mono); font-weight: 400; letter-spacing: 0.02em; }\n.micro { font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; }\n.lg { font-size: clamp(20px, 2.4vw, 30px); line-height: 1.15; }\n.xl { font-size: clamp(40px, 6vw, 84px); line-height: 0.95; }\n.md { font-size: clamp(15px, 1.3vw, 18px); line-height: 1.55; }\n.mute { color: var(--ink-2); }\n\n/* =====================================================\n   TOPBAR\n   ===================================================== */\n.topbar {\n  position: sticky; top: 0; z-index: 50;\n  display: grid; grid-template-columns: 1fr auto 1fr;\n  align-items: center;\n  padding: 14px var(--pad);\n  background: var(--bg);\n  border-bottom: 1px solid var(--rule);\n  backdrop-filter: blur(6px);\n}\n.topbar__left { display: flex; align-items: center; gap: 10px; }\n.topbar__center { text-align: center; }\n.topbar__right { justify-self: end; }\n\n.dot {\n  width: 8px; height: 8px; border-radius: 50%;\n  background: var(--accent);\n  box-shadow: 0 0 0 0 rgba(168,72,46,0.5);\n  animation: pulse 2.4s infinite;\n}\n@keyframes pulse {\n  0%,100% { box-shadow: 0 0 0 0 rgba(168,72,46,0.55); }\n  50%     { box-shadow: 0 0 0 6px rgba(168,72,46,0);    }\n}\n\n.lang-toggle {\n  background: none; border: 1px solid var(--rule);\n  padding: 6px 10px; cursor: pointer;\n  font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em;\n  display: inline-flex; align-items: center; gap: 6px;\n  color: var(--ink); border-radius: 0;\n  transition: background .2s ease, color .2s ease;\n}\n.lang-toggle:hover { background: var(--ink); color: var(--bg); }\n.lang-toggle__opt { opacity: .35; transition: opacity .2s ease; }\n.lang-toggle__opt.is-active { opacity: 1; }\n.lang-toggle__sep { opacity: .35; }\n\n/* =====================================================\n   HERO\n   ===================================================== */\n.hero {\n  position: relative;\n  padding: var(--pad-y) var(--pad) calc(var(--pad-y) * 0.7);\n  border-bottom: 1px solid var(--rule);\n  min-height: 88vh;\n  display: flex; flex-direction: column; justify-content: space-between;\n  overflow: hidden;\n}\n.hero__meta {\n  display: flex; justify-content: space-between;\n  border-bottom: 1px solid var(--rule-soft);\n  padding-bottom: 10px;\n}\n\n.hero__name {\n  font-family: var(--serif);\n  font-size: clamp(64px, 16vw, 240px);\n  line-height: 0.84;\n  margin: clamp(40px, 7vw, 80px) 0 clamp(40px, 6vw, 80px);\n  letter-spacing: -0.03em;\n  font-weight: 400;\n}\n.hero__name .line { display: block; }\n.hero__name .line--indent  { padding-left: 8vw; }\n.hero__name .line--indent2 { padding-left: 16vw; font-style: italic; color: var(--accent); }\n.hero__name .word {\n  display: inline-block;\n  will-change: transform;\n  transition: transform 0.6s cubic-bezier(0.2, 0.9, 0.2, 1);\n}\n\n.hero__sub {\n  display: grid;\n  grid-template-columns: 1fr 1.4fr;\n  gap: clamp(24px, 4vw, 64px);\n  border-top: 1px solid var(--rule);\n  padding-top: 20px;\n}\n.hero__sub p { margin: 8px 0 0; max-width: 32ch; }\n.hero__sub .hero__tag p { max-width: 38ch; }\n\n.hero__hint {\n  position: absolute; right: var(--pad); bottom: 24px;\n  color: var(--ink-2);\n}\n\n/* =====================================================\n   BLOCKS (sections)\n   ===================================================== */\n.block {\n  padding: var(--pad-y) var(--pad);\n  border-bottom: 1px solid var(--rule);\n  position: relative;\n}\n.block__num {\n  font-size: 11px; letter-spacing: 0.14em;\n  color: var(--accent);\n  margin-bottom: 18px;\n}\n.block__head {\n  display: flex; flex-direction: column;\n  align-items: flex-start; gap: 14px;\n  border-bottom: 1px solid var(--rule);\n  padding-bottom: 22px;\n  margin-bottom: 36px;\n}\n.block__head h2 { margin: 0; order: 2; }\n.block__head .micro { color: var(--ink-2); order: 1; }\n\n.two-col {\n  display: grid;\n  grid-template-columns: 1.1fr 1fr;\n  gap: clamp(24px, 4vw, 80px);\n}\n@media (max-width: 720px) {\n  .two-col { grid-template-columns: 1fr; }\n}\n\n/* =====================================================\n   ROWS (timeline-like list)\n   ===================================================== */\n.row {\n  display: grid;\n  grid-template-columns: 200px 1fr;\n  gap: clamp(20px, 3vw, 56px);\n  padding: 28px 0;\n  border-bottom: 1px dashed var(--rule-soft);\n  transition: background .25s ease, padding-left .35s cubic-bezier(0.2,0.9,0.2,1);\n}\n.row:last-child { border-bottom: 0; }\n.row:hover {\n  background: linear-gradient(90deg, rgba(168,72,46,0.06), transparent 70%);\n  padding-left: 12px;\n}\n.row__when {\n  font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;\n  color: var(--ink-2);\n  display: flex; flex-direction: column; gap: 4px;\n  padding-top: 8px;\n}\n.row__what h3 { margin: 0 0 6px; }\n.row__what p { margin: 0 0 10px; }\n.bullets { margin: 12px 0 0; padding: 0; list-style: none; }\n.bullets li {\n  font-size: 16px; line-height: 1.5;\n  padding: 6px 0 6px 22px;\n  position: relative;\n  border-top: 1px solid var(--rule-soft);\n}\n.bullets li:first-child { border-top: 0; }\n.bullets li::before {\n  content: \"→\"; position: absolute; left: 0; top: 6px;\n  color: var(--accent); font-family: var(--mono); font-size: 13px;\n}\n\n@media (max-width: 720px) {\n  .row { grid-template-columns: 1fr; gap: 8px; }\n  .row__when { padding-top: 0; }\n}\n\n/* =====================================================\n   CARDS (projects)\n   ===================================================== */\n.block__body {\n  display: flex; flex-direction: column;\n}\n#proyectos .block__body {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));\n  gap: 0;\n  border-top: 1px solid var(--rule);\n}\n.card {\n  padding: 28px 28px 32px;\n  border-right: 1px solid var(--rule);\n  border-bottom: 1px solid var(--rule);\n  transition: background .3s ease;\n  position: relative;\n}\n.card:last-child { border-right: 0; }\n.card:hover { background: var(--bg-2); }\n.card__top {\n  display: flex; justify-content: space-between;\n  margin-bottom: 22px;\n  color: var(--ink-2);\n}\n.card__top span:last-child { color: var(--accent); }\n.card h3 { margin: 0 0 14px; }\n.card p { margin: 0 0 18px; }\n.card__meta {\n  color: var(--ink-2);\n  display: flex; gap: 8px; flex-wrap: wrap;\n  border-top: 1px solid var(--rule-soft);\n  padding-top: 12px;\n}\n\n@media (max-width: 720px) {\n  #proyectos .block__body { grid-template-columns: 1fr; }\n  .card { border-right: 0; }\n}\n\n/* =====================================================\n   SPLIT (skills + idiomas)\n   ===================================================== */\n.block--split { padding: 0; }\n.split {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n}\n.split__col {\n  padding: var(--pad-y) var(--pad);\n  border-right: 1px solid var(--rule);\n}\n.split__col:last-child { border-right: 0; }\n@media (max-width: 860px) {\n  .split { grid-template-columns: 1fr; }\n  .split__col { border-right: 0; border-bottom: 1px solid var(--rule); }\n  .split__col:last-child { border-bottom: 0; }\n}\n\n/* skills */\n.kv__row {\n  display: grid;\n  grid-template-columns: 130px 1fr;\n  gap: 24px;\n  padding: 20px 0;\n  border-bottom: 1px dashed var(--rule-soft);\n  align-items: start;\n}\n.kv__row:last-child { border-bottom: 0; }\n.kv__row .micro { padding-top: 10px; color: var(--ink-2); }\n.chips { display: flex; flex-wrap: wrap; gap: 6px; }\n.chip {\n  display: inline-block;\n  padding: 6px 10px;\n  border: 1px solid var(--rule);\n  font-family: var(--mono); font-size: 12px;\n  letter-spacing: 0.04em;\n  background: var(--bg);\n  transition: background .2s ease, color .2s ease, transform .2s ease;\n}\n.chip:hover {\n  background: var(--ink); color: var(--bg);\n  transform: translate(-2px, -2px);\n  box-shadow: 4px 4px 0 0 var(--accent);\n}\n\n/* idiomas */\n.lang-list { list-style: none; padding: 0; margin: 0; }\n.lang-list li {\n  display: grid;\n  grid-template-columns: 1.2fr auto 2fr;\n  align-items: center;\n  gap: 16px;\n  padding: 18px 0;\n  border-bottom: 1px dashed var(--rule-soft);\n}\n.lang-list li:last-child { border-bottom: 0; }\n.lang-list .mono { color: var(--ink-2); justify-self: end; }\n.bar {\n  height: 2px; background: var(--rule-soft);\n  position: relative; overflow: hidden;\n}\n.bar::after {\n  content: \"\";\n  position: absolute; left: 0; top: 0; bottom: 0;\n  width: var(--p, 0%);\n  background: var(--accent);\n  transform-origin: left;\n  animation: barIn 1.4s cubic-bezier(0.2,0.9,0.2,1) both;\n}\n@keyframes barIn {\n  from { transform: scaleX(0); }\n  to   { transform: scaleX(1); }\n}\n\n/* =====================================================\n   MARQUEE LIST (intereses)\n   ===================================================== */\n.marquee-list {\n  list-style: none; padding: 0; margin: 0;\n  display: flex; flex-wrap: wrap;\n  gap: 0;\n}\n.marquee-list li {\n  font-family: var(--serif);\n  font-size: clamp(28px, 5vw, 64px);\n  line-height: 1.1;\n  padding: 8px 24px 8px 0;\n  letter-spacing: -0.02em;\n  position: relative;\n  cursor: default;\n  transition: color .25s ease, font-style .25s ease;\n}\n.marquee-list li::after {\n  content: \"·\";\n  position: absolute; right: 8px; top: 8px;\n  color: var(--accent); font-family: var(--mono);\n  font-size: 28px;\n}\n.marquee-list li:last-child::after { display: none; }\n.marquee-list li:hover {\n  color: var(--accent);\n  font-style: italic;\n}\n\n/* =====================================================\n   CONTACT\n   ===================================================== */\n.contact-grid {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  border-top: 1px solid var(--rule);\n}\n.contact {\n  display: grid;\n  grid-template-columns: 90px 1fr auto;\n  align-items: center;\n  gap: 18px;\n  padding: 28px var(--pad) 28px 0;\n  border-bottom: 1px solid var(--rule);\n  border-right: 1px solid var(--rule);\n  transition: background .25s ease, padding-left .35s cubic-bezier(0.2,0.9,0.2,1);\n  cursor: pointer;\n}\n.contact:nth-child(2n) { border-right: 0; }\n.contact:hover { background: var(--ink); color: var(--bg); padding-left: 12px; }\n.contact:hover .arrow { transform: translateX(8px); color: var(--accent); }\n.contact:hover .micro { color: var(--accent); }\n.contact .micro { color: var(--ink-2); }\n.contact__val { word-break: break-all; }\n.arrow { transition: transform .25s ease, color .25s ease; }\n\n@media (max-width: 720px) {\n  .contact-grid { grid-template-columns: 1fr; }\n  .contact { border-right: 0; padding-right: 12px; grid-template-columns: 80px 1fr auto; }\n}\n\n.closing {\n  margin: 56px 0 0;\n  font-size: clamp(22px, 3.5vw, 40px);\n  line-height: 1.15;\n  max-width: 24ch;\n  color: var(--accent);\n}\n\n/* =====================================================\n   FOOTER\n   ===================================================== */\n.foot {\n  display: grid;\n  grid-template-columns: 1fr 1fr 1fr;\n  padding: 18px var(--pad);\n  border-top: 1px solid var(--rule);\n  background: var(--bg);\n}\n.foot__col { color: var(--ink-2); }\n.foot__col--center { text-align: center; }\n.foot__col--right { text-align: right; }\n\n@media (max-width: 720px) {\n  .foot { grid-template-columns: 1fr; gap: 6px; text-align: center; }\n  .foot__col--center, .foot__col--right { text-align: center; }\n}\n\n/* =====================================================\n   TOAST\n   ===================================================== */\n.toast {\n  position: fixed; bottom: 28px; left: 50%;\n  transform: translateX(-50%) translateY(20px);\n  background: var(--ink); color: var(--bg);\n  font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em;\n  padding: 12px 18px;\n  pointer-events: none;\n  opacity: 0;\n  transition: opacity .25s ease, transform .25s ease;\n  z-index: 100;\n}\n.toast.is-show {\n  opacity: 1;\n  transform: translateX(-50%) translateY(0);\n}\n\n/* =====================================================\n   reduced motion\n   ===================================================== */\n@media (prefers-reduced-motion: reduce) {\n  * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }\n  .hero__name .word { transform: none !important; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- ==================== TOP BAR ==================== -->\n<header class=\"topbar\">\n  <div class=\"topbar__left\">\n    <span class=\"dot\" aria-hidden=\"true\"><\u002Fspan>\n    <span class=\"mono micro\">MX–CDMX · 19.43°N 99.13°W<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"topbar__center\">\n    <span class=\"mono micro\" id=\"clock\">--:--:--<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"topbar__right\">\n    <button class=\"lang-toggle\" id=\"lang-toggle\" aria-label=\"Switch language\">\n      <span class=\"lang-toggle__opt is-active\" data-lang=\"es\">ES<\u002Fspan>\n      <span class=\"lang-toggle__sep\">/<\u002Fspan>\n      <span class=\"lang-toggle__opt\" data-lang=\"en\">EN<\u002Fspan>\n    <\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<main>\n\n<!-- ==================== HERO ==================== -->\n<section class=\"hero\" id=\"hero\">\n\n  <div class=\"hero__meta\">\n    <div class=\"mono micro hero__id\">\n      <span data-i18n=\"hero.id\">N.° 001 — TARJETA PERSONAL<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"mono micro hero__year\">2026 / MMXXVI<\u002Fdiv>\n  <\u002Fdiv>\n\n  <h1 class=\"hero__name\" id=\"magnetic-name\" aria-label=\"Tamara Terroba Schnaas\">\n    <span class=\"line\"><span class=\"word\" data-text=\"TAMARA\">TAMARA<\u002Fspan><\u002Fspan>\n    <span class=\"line line--indent\"><span class=\"word\" data-text=\"TERROBA\">TERROBA<\u002Fspan><\u002Fspan>\n    <span class=\"line line--indent2\"><span class=\"word\" data-text=\"SCHNAAS\">SCHNAAS<\u002Fspan><\u002Fspan>\n  <\u002Fh1>\n\n  <div class=\"hero__sub\">\n    <div class=\"hero__role\">\n      <span class=\"mono micro\">[ ROLE ]<\u002Fspan>\n      <p class=\"serif lg\" data-i18n=\"hero.role\">Data Science · estudiante en ITAM<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"hero__tag\">\n      <span class=\"mono micro\">[ STATEMENT ]<\u002Fspan>\n      <p class=\"serif italic lg\" data-i18n=\"hero.tag\">Convertir datos en decisiones — y, ocasionalmente, en historias.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hero__hint mono micro\">\n    <span data-i18n=\"hero.hint\">↓ MUEVE EL CURSOR · DESPLAZAMIENTO MAGNÉTICO<\u002Fspan>\n  <\u002Fdiv>\n\n  <a href=\"/juego.html\" style=\"\n    display: inline-block;\n    margin-top: 2.5rem;\n    padding: 1rem 2.4rem;\n    border: 2px solid #a8482e;\n    font-family: 'JetBrains Mono', ui-monospace, monospace;\n    font-size: 0.82rem;\n    text-decoration: none;\n    color: #a8482e;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    transition: background .2s, color .2s, transform .2s, box-shadow .2s;\n  \" onmouseover=\"this.style.background='#a8482e';this.style.color='#f4ede0';this.style.transform='translate(-2px,-2px)';this.style.boxShadow='4px 4px 0 0 #1f1d1a'\" onmouseout=\"this.style.background='';this.style.color='#a8482e';this.style.transform='';this.style.boxShadow=''\">\n    \u00bfPrefieres explorar mi CV de manera diferente? \u2192\n  <\u002Fa>\n\n<\u002Fsection>\n\n<!-- ==================== SOBRE ==================== -->\n<section class=\"block\" id=\"sobre\">\n  <div class=\"block__num mono\">01<\u002Fdiv>\n  <div class=\"block__head\">\n    <h2 class=\"serif xl\" data-i18n=\"about.title\">Sobre<\u002Fh2>\n    <span class=\"mono micro\" data-i18n=\"about.kicker\">— qué hago, por qué<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"block__body two-col\">\n    <p class=\"serif md\" data-i18n=\"about.p1\">\n      Soy estudiante de Ciencia de Datos en el ITAM, con experiencia en análisis\n      logístico, dashboards de business intelligence y limpieza de datos a gran escala.\n      Me interesa el punto donde los datos dejan de ser una hoja de cálculo y se vuelven\n      una decisión.\n    <\u002Fp>\n    <p class=\"md\" data-i18n=\"about.p2\">\n      Acabo de regresar de un semestre de intercambio en WU Vienna, donde estudié\n      <em>business analytics<\u002Fem> y estrategia basada en datos. Hablo cuatro idiomas\n      en distintos niveles de seguridad. Me gustan los entornos internacionales,\n      las preguntas bien formuladas y los procesos que se pueden medir.\n    <\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ==================== EDUCACIÓN ==================== -->\n<section class=\"block\" id=\"educacion\">\n  <div class=\"block__num mono\">02<\u002Fdiv>\n  <div class=\"block__head\">\n    <h2 class=\"serif xl\" data-i18n=\"edu.title\">Educación<\u002Fh2>\n    <span class=\"mono micro\" data-i18n=\"edu.kicker\">— dónde he estudiado<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"block__body\">\n    <article class=\"row\">\n      <div class=\"row__when mono\">\n        <span>2022 —<\u002Fspan><span data-i18n=\"edu.itam.now\">Presente<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"row__what\">\n        <h3 class=\"serif lg\">Instituto Tecnológico Autónomo de México<\u002Fh3>\n        <p class=\"md\" data-i18n=\"edu.itam.line\">Licenciatura en Ciencia de Datos · Ciudad de México<\u002Fp>\n        <p class=\"mono micro mute\" data-i18n=\"edu.itam.course\">\n          Coursework: Machine Learning · Estadística Avanzada · Álgebra Lineal · Bases de Datos · Programación\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"row\">\n      <div class=\"row__when mono\">\n        <span data-i18n=\"edu.wu.when\">Otoño 2025<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"row__what\">\n        <h3 class=\"serif lg\">WU Wien — Vienna University of Economics and Business<\u002Fh3>\n        <p class=\"md\" data-i18n=\"edu.wu.line\">Semestre de intercambio · Viena, Austria<\u002Fp>\n        <p class=\"mono micro mute\" data-i18n=\"edu.wu.course\">\n          Cursos en inglés sobre business analytics y estrategia data-driven.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"row\">\n      <div class=\"row__when mono\">\n        <span>Oct 2025 — Ene 2026<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"row__what\">\n        <h3 class=\"serif lg\">Open German UDS<\u002Fh3>\n        <p class=\"md\" data-i18n=\"edu.uds.line\">Micro-Degree en Entrepreneurial Finance and Innovation · 5 ECTS<\u002Fp>\n        <p class=\"mono micro mute\" data-i18n=\"edu.uds.course\">\n          Finanzas para startups, estrategia de innovación y gobierno corporativo.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Farticle>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ==================== EXPERIENCIA ==================== -->\n<section class=\"block\" id=\"experiencia\">\n  <div class=\"block__num mono\">03<\u002Fdiv>\n  <div class=\"block__head\">\n    <h2 class=\"serif xl\" data-i18n=\"exp.title\">Experiencia<\u002Fh2>\n    <span class=\"mono micro\" data-i18n=\"exp.kicker\">— dónde he trabajado<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"block__body\">\n    <article class=\"row\">\n      <div class=\"row__when mono\"><span>May 2024 — May 2025<\u002Fspan><\u002Fdiv>\n      <div class=\"row__what\">\n        <h3 class=\"serif lg\">VSP · Soluciones Tecnológicas<\u002Fh3>\n        <p class=\"md mute\" data-i18n=\"exp.vsp.role\">Data Analyst Jr. · Ciudad de México<\u002Fp>\n        <ul class=\"bullets\">\n          <li data-i18n=\"exp.vsp.b1\">Analicé datos logísticos y de entregas; las optimizaciones propuestas redujeron costos operativos en 15%.<\u002Fli>\n          <li data-i18n=\"exp.vsp.b2\">Construí 5+ dashboards de BI traduciendo datasets complejos en decisiones accionables.<\u002Fli>\n          <li data-i18n=\"exp.vsp.b3\">Colaboré con equipos cross-funcionales para apoyar estrategias data-driven y mejorar el desempeño operativo.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"row\">\n      <div class=\"row__when mono\"><span>2024 — Jul 2025<\u002Fspan><\u002Fdiv>\n      <div class=\"row__what\">\n        <h3 class=\"serif lg\">Biblioteca Pública José Martí<\u002Fh3>\n        <p class=\"md mute\" data-i18n=\"exp.bib.role\">Database Management (Servicio Social) · Ciudad de México<\u002Fp>\n        <ul class=\"bullets\">\n          <li data-i18n=\"exp.bib.b1\">Lideré la limpieza y estructuración de 15,000+ registros, mejorando precisión 90% y eficiencia de búsqueda 85%.<\u002Fli>\n          <li data-i18n=\"exp.bib.b2\">Diseñé datasets estructurados para mejorar accesibilidad y usabilidad de los usuarios finales.<\u002Fli>\n          <li data-i18n=\"exp.bib.b3\">Apliqué técnicas de organización y validación para apoyar la transformación digital de la institución.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"row\">\n      <div class=\"row__when mono\"><span>Jun 2022<\u002Fspan><\u002Fdiv>\n      <div class=\"row__what\">\n        <h3 class=\"serif lg\">Christel House de México A.C.<\u002Fh3>\n        <p class=\"md mute\" data-i18n=\"exp.ch.role\">IT Assistant · Ciudad de México<\u002Fp>\n        <ul class=\"bullets\">\n          <li data-i18n=\"exp.ch.b1\">Soporte técnico a estudiantes, manteniendo el sistema operativo durante periodos académicos críticos.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Farticle>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ==================== PROYECTOS ==================== -->\n<section class=\"block\" id=\"proyectos\">\n  <div class=\"block__num mono\">04<\u002Fdiv>\n  <div class=\"block__head\">\n    <h2 class=\"serif xl\" data-i18n=\"proj.title\">Proyectos<\u002Fh2>\n    <span class=\"mono micro\" data-i18n=\"proj.kicker\">— en lo que he estado metida<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"block__body\">\n\n    <article class=\"card\">\n      <div class=\"card__top\">\n        <span class=\"mono micro\">P/01<\u002Fspan>\n        <span class=\"mono micro\" data-i18n=\"proj.lab.tag\">[ ACTIVO ]<\u002Fspan>\n      <\u002Fdiv>\n      <h3 class=\"serif lg\">Sports Analytics Lab — ITAM<\u002Fh3>\n      <p class=\"md\" data-i18n=\"proj.lab.desc\">\n        Análisis de desempeño de jugadores y partidos para identificar patrones y\n        drivers de rendimiento. Visualizaciones y modelos predictivos básicos para\n        apoyar decisiones de coaching y estrategia.\n      <\u002Fp>\n      <div class=\"card__meta mono micro\">\n        <span>2025 — <span data-i18n=\"proj.lab.now\">Presente<\u002Fspan><\u002Fspan>\n        <span>·<\u002Fspan>\n        <span>Python · R · Looker<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"card\">\n      <div class=\"card__top\">\n        <span class=\"mono micro\">P/02<\u002Fspan>\n        <span class=\"mono micro\" data-i18n=\"proj.vsp.tag\">[ ARCHIVADO ]<\u002Fspan>\n      <\u002Fdiv>\n      <h3 class=\"serif lg\" data-i18n=\"proj.vsp.title\">Optimización Logística — VSP<\u002Fh3>\n      <p class=\"md\" data-i18n=\"proj.vsp.desc\">\n        Análisis de rutas y tiempos de entrega; identificación de cuellos de botella\n        y propuestas de re-asignación que recortaron 15% de costos operativos.\n        Resultados materializados en cinco dashboards de BI.\n      <\u002Fp>\n      <div class=\"card__meta mono micro\">\n        <span>2024 — 2025<\u002Fspan>\n        <span>·<\u002Fspan>\n        <span>SQL Server · Looker · Excel<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <article class=\"card\">\n      <div class=\"card__top\">\n        <span class=\"mono micro\">P/03<\u002Fspan>\n        <span class=\"mono micro\" data-i18n=\"proj.lib.tag\">[ ENTREGADO ]<\u002Fspan>\n      <\u002Fdiv>\n      <h3 class=\"serif lg\" data-i18n=\"proj.lib.title\">15,000 registros — Biblioteca José Martí<\u002Fh3>\n      <p class=\"md\" data-i18n=\"proj.lib.desc\">\n        Diseño de un esquema de datos limpio y validado para el catálogo público;\n        90% de mejora en precisión, 85% en eficiencia de búsqueda. Servicio social,\n        un año.\n      <\u002Fp>\n      <div class=\"card__meta mono micro\">\n        <span>2024 — 2025<\u002Fspan>\n        <span>·<\u002Fspan>\n        <span>SQL · Data Cleaning<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ==================== SKILLS + IDIOMAS ==================== -->\n<section class=\"block block--split\" id=\"skills\">\n  <div class=\"split\">\n    <div class=\"split__col\">\n      <div class=\"block__num mono\">05<\u002Fdiv>\n      <div class=\"block__head\">\n        <h2 class=\"serif xl\" data-i18n=\"skills.title\">Skills<\u002Fh2>\n        <span class=\"mono micro\" data-i18n=\"
